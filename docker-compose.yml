version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_summarizer
      POSTGRES_USER: starlight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StarlightDB2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlight -d meeting_summarizer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: online-meeting-summarizer-backend
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://starlight:${DB_PASSWORD:-StarlightDB2026!}@db:5432/meeting_summarizer
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkeydefaultforstarlightsecondaryschool2026!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@starlight.sc.ug}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Starlight2026!}
      SCHOOL_NAME: Starlight Secondary School
      TIMEZONE: Africa/Kampala
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - recordings:/workspace/storage

  worker:
    image: online-meeting-summarizer-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://starlight:${DB_PASSWORD:-StarlightDB2026!}@db:5432/meeting_summarizer
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkeydefaultforstarlightsecondaryschool2026!}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      - recordings:/workspace/storage
    command: ["celery", "-A", "app.workers.tasks", "worker", "--loglevel=info", "--concurrency=2"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000

volumes:
  pgdata:
  recordings:
