# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathposts to be prepended to the system path when running.
# This is needed so that 'app' can be imported.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to clone to slug. Defaults to 40
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that are relative to the
# directory containing the alembic.ini file.
# allow_empty_history = false

# version locations.  specifies where to look for version files.
# version_locations = %(here)s/migrations/versions

# version path separator; as above
# version_path_separator = os.pathsep

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./meeting_summarizer.db

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for details.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
